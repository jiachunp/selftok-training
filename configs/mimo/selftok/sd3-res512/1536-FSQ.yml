common:
    output_path: './ckpt_stage3_template_short_caption_improved'
    log_path: './logs_stage3_template_short_caption_improved'
    save_per_epochs: 1.0
    eval_per_epochs: 1.0
    eval_first: 0
    use_fp16: 0
    use_bf16: 1
    use_zero: 0
    use_fsdp: 1
    use_2d_rope: 0
    use_deepspeed: 0
    random_seed: 123
    log_interval: 50
    machines: 1
    task: 'selftokenc'
    experiment_index: 0
    delete_after_upload: False
    log_recon_interval: 100
    val_interval: 0
    ckpt_interval: 2000
    vae_path: '/data/ckpt/stable-diffusion-3-medium-diffusers/vae'
    resume_exclude_opt: False
    pre_encode: False
    resume_from_steps: 0

model:
    pretrain_model: ''

optimize:
    max_epochs: 1000
    warmup_epochs: 0.01
    ema_in_cpu: False
    grad_norm: 0.0
    lr_scheduler:
        dit_lr: 1.0e-5
        token_lr: 5.0e-5
        init_lr: 5.0e-5
        init_step1: 5000
        init_step2: 50000
        max_step: 100000
        min_lr1: 5.0e-5
        min_lr2: 5.0e-5
        vlm_mlp_lr: 2.0e-5

tokenizer:
    is_text_tokenized: False
    pretrained_dit_path: /data/ckpt/sd3/sd3_medium.safetensors
    params:
        image_size: 512
        k: 1536
        stages: '1000'
        k_per_stage: '1536'
        gradient_checkpointing: False
        in_channels: 16
        encoder_hidden_size: 16
        pretrained_vl_path: /data/ckpt/Qwen2.5VL/Qwen2.5-VL-3B-Instruct
        
        diffusion_type: 'flow'
        noise_schedule_config:
            schedule: 'log_norm'
            parameterization: 'velocity'
            force_recon: False
            m: 0.0
            s: 1.0
        
        enc: 'Enc-Qformer-Uni-XL/2'
        enable_enc_variable_size: True
        encoder_config:
            time_adaln: True
            qformer_mode: 'dual'
            pre_norm: False
            post_norm: False
            xavier_init: False
            qk_norm: False
            attn_mask: False

        quantizer_config:
            codebook_size: 16384
            code_dim: 16
            w_diversity: 1.0
            ema_entropy_ratio: 0.8
            w_commit: 1.0
            decay: 0.99
            dead_code_threshold: 0.2
            reset_cluster_size: 0.2
            continuous: False
            reg: [0.1, 0.3]
            K: 1536
            use_fsq: True
            levels: [4, 4, 4, 4, 4, 4, 4]

        model: 'MMDiT_XL'
        decoder_config:
            sd3_cond_pooling: None
            class_dropout_prob: 0.1
            train_filter: 'all'
            freeze_filter: ''
            # qk_norm: 'rms'
            init_method: None
            #register_length: 8
            time_adaln: 'pos_emb'

data: 
    batch_size: 4
    num_workers: 8
    dataset:
        target: base.ParquetImageNetDataset
        parquet_dir: /data/data/Unified_Parquet/ImageNet-Short-Caption_merged_by_image_id
        # parquet_dir: /data/data/imagenet_bigsun_short_caption_debug
        max_size: 512
        selftok_token_length: 1536
